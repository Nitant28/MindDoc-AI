services:
  - type: web
    name: minddoc-ai-unified
    env: docker
    plan: free
    region: oregon
    healthCheckPath: /api/health
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: openai/gpt-oss-120b:free
      - key: DATABASE_URL
        value: sqlite:///./minddoc.db
