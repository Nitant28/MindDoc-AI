services:
  - type: web
    name: minddoc-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python run_server.py
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11

databases:
  - name: minddoc-db
    plan: free
